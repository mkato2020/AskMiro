<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AskMiro Ops</title>

<!-- FIX: allow Apps Script JSONP domains -->
<meta http-equiv="Content-Security-Policy" content="
default-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com;
script-src 'self' 'unsafe-inline' https://esm.sh https://cdn.jsdelivr.net;
style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
connect-src 'self' https://ijpuizwmcxkictqyjcrf.supabase.co wss://ijpuizwmcxkictqyjcrf.supabase.co;
img-src 'self' data:;
">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css">
</head>
<body>
<div id="toast-wrap"></div>
<div class="ov hidden" id="ov" onclick="if(event.target===this)UI.closeModal()">
  <div class="modal" id="modal" onclick="event.stopPropagation()"></div>
</div>
<div class="drawer" id="drawer">
  <div class="drawer-hd"><h3 id="drawer-title">Details</h3><button class="xbtn" onclick="UI.closeDrawer()">&#x2715;</button></div>
  <div class="drawer-body" id="drawer-body"></div>
</div>

<div id="login-screen" class="login-screen hidden">
  <div class="login-card">
    <div class="login-logo">
      <svg width="40" height="40" viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="6" fill="#0D9488"/><path d="M8 20L12 12L16 20L20 12L24 20" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <h1>AskMiro <em>Ops</em></h1>
    <p class="login-sub">Enter your access token to continue</p>
    <div class="fg">
      <label class="fl">Access Token</label>
      <input type="password" class="fin" id="token-input" placeholder="miro_..." autocomplete="current-password" onkeydown="if(event.key==='Enter')Auth.login()">
    </div>
    <div id="login-err" class="login-err hidden"></div>
    <button class="btn bp" id="login-btn" onclick="Auth.login()">Sign In &#8594;</button>
    <p class="login-help">Need access? Contact <a href="mailto:info@askmiro.com">info@askmiro.com</a></p>
  </div>
</div>

<div id="app-shell" class="hidden">
  <aside class="sidebar">
    <div class="sb-logo">
      <svg width="28" height="28" viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="6" fill="#0D9488"/><path d="M8 20L12 12L16 20L20 12L24 20" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span class="sb-wordmark">Ask<em>Miro</em></span>
    </div>
    <nav class="sb-nav" id="sb-nav">
      <a class="ni" data-route="dashboard">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Dashboard
      </a>
      <a class="ni" data-route="crm">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
        CRM
        <span class="nb" id="badge-crm" style="display:none">0</span>
      </a>
      <a class="ni" data-route="quotes">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/></svg>
        Quotes
        <span class="nb" id="badge-quotes" style="display:none">0</span>
      </a>
      <a class="ni" data-route="contracts">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        Contracts
      </a>
      <div class="nd"></div>
      <a class="ni" data-route="ops">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Operations
      </a>
      <a class="ni" data-route="quality">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        Quality
        <span class="nb nb-red" id="badge-quality" style="display:none">0</span>
      </a>
      <div class="nd"></div>
      <a class="ni" data-route="finance">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        Finance
      </a>
      <a class="ni" data-route="email">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        Email
        <span class="nb" id="badge-email" style="display:none">0</span>
      </a>
      <a class="ni" data-route="admin">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Admin
      </a>
    </nav>
    <div class="sb-user">
      <div class="av" id="user-av">MK</div>
      <div class="sb-user-info"><strong id="user-name">Loading&#8230;</strong><span id="user-role">&#8212;</span></div>
      <button class="xbtn" onclick="Auth.logout()" title="Sign out">&#x2715;</button>
    </div>
  </aside>

  <div class="main-wrap">
    <header class="topbar">
      <div class="live-dot"></div>
      <span class="page-title" id="page-title">Dashboard</span>
      <div class="tb-spacer"></div>
      <span class="tb-env" id="tb-env">&#9679; Live</span>
      <button class="btn bp btn-sm" id="primary-cta" style="display:none">Action</button>
    </header>
    <main class="main-content" id="main-content">
      <div class="page-loader" id="page-loader">
        <div class="spinner"></div>
        <span>Loading&#8230;</span>
      </div>
    </main>
  </div>
</div>

<script src="assets/config.js"></script>
<script src="assets/api.js"></script>
<script src="assets/ui.js"></script>
<script src="assets/auth.js"></script>
<script src="assets/router.js"></script>
<script src="modules/dashboard.js"></script>
<script src="modules/crm.js"></script>
<script src="modules/quotes.js"></script>
<script src="modules/contracts.js"></script>
<script src="modules/ops.js"></script>
<script src="modules/quality.js"></script>
<script src="modules/finance.js"></script>
<script src="modules/admin.js"></script>
<script src="modules/email.js"></script>
<script type="module" src="assets/app.js"></script>
</body>
</html>
